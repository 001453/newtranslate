<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GlobalBridge Live Captions</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>GlobalBridge</h1>
      <p class="sub">Local live captions</p>
    </header>

    <div id="status" class="status idle">Idle</div>
    <p id="error" class="error" hidden></p>

    <label>
      My language
      <select id="myLang">
        <option value="tr">Turkish</option>
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ru">Russian</option>
      </select>
    </label>

    <label>
      Tab / speech language
      <select id="otherLang">
        <option value="en">English</option>
        <option value="tr">Turkish</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="ar">Arabic</option>
        <option value="zh">Chinese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ru">Russian</option>
      </select>
    </label>

    <button id="toggle" class="primary">Start captions</button>

    <p class="hint">
      Requires <code>npm run dev</code> (API :8000 + QVAC :8765). Captions overlay on the active tab.
    </p>

    <script type="module" src="popup.js"></script>
  </body>
</html>
